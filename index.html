<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Kiosk Menu</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        #menu-container {
            display: flex;
            gap: 40px;
            width: 90%;
            max-width: 1000px;
            justify-content: center;
        }

        .kiosk-option {
            flex: 1;
            height: 400px;
            background: #111;
            border: 1px solid #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .kiosk-option:hover {
            transform: translateY(-10px);
            border-color: #ffc107;
            background: #1a1a1a;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), 0 0 20px rgba(255, 193, 7, 0.1);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .kiosk-option:hover .icon {
            transform: scale(1.1);
        }

        h2 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
        }

        p {
            margin-top: 10px;
            color: #888;
            font-size: 0.9rem;
            text-align: center;
            padding: 0 20px;
        }

        /* Subtle Accent Line */
        .kiosk-option::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 4px;
            background: #ffc107;
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .kiosk-option:hover::after {
            transform: scaleX(1);
        }

        @media (max-width: 600px) {
            #menu-container { flex-direction: column; }
            .kiosk-option { height: 250px; }
        }

        footer {
            /* Optional styling */
            background-color: #f1f1f1;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div id="menu-container">
        
        <a href="kiosks/anime.html" class="kiosk-option">
            <div class="icon">📺</div>
            <h2>Anime</h2>
            <p>2013 - Present<br>High Popularity Discovery</p>
        </a>

        <a href="kiosks/manga.html" class="kiosk-option">
            <div class="icon">📖</div>
            <h2>Manga</h2>
            <p>2016 - Present<br>Detailed Synopsis View</p>
        </a>

    </div>

</body>
</html>
