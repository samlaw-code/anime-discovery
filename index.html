<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Kiosk</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        #container { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
        }

        #bg-blur { 
            position: absolute; 
            top: -5%; left: -5%; width: 110%; height: 110%; 
            background-size: cover; 
            background-position: center; 
            filter: blur(60px) brightness(0.25); 
            transition: background-image 1.5s ease-in-out; 
            z-index: 1; 
        }

        #poster { 
            position: relative; 
            height: 95vh; /* Poster now occupies almost the entire vertical space */
            width: auto;
            object-fit: contain; 
            margin-top: 0; 
            transition: opacity 1.5s ease-in-out; 
            z-index: 2;
        }

        #info-overlay { 
            position: absolute; 
            bottom: 0; left: 0; right: 0; 
            /* A tighter gradient focused only at the very bottom */
            background: linear-gradient(transparent, rgba(0,0,0,0.7) 30%, rgba(0,0,0,0.9) 100%); 
            color: white; 
            padding: 40px 20px 10px 20px; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center; /* Center text under the poster */
            transition: opacity 1.5s ease-in-out; 
            z-index: 3; 
            pointer-events: none;
        }

        #title { 
            font-size: 1.6rem; 
            font-weight: 700; 
            margin-bottom: 2px; 
            text-align: center;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #meta { 
            font-size: 0.95rem; 
            color: #ccc; 
            text-align: center;
            text-shadow: 1px 1px 4px rgba(0,0,0,1);
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="container" onclick="fetchDiscoveryAnime()">
        <div id="bg-blur"></div>
        <img id="poster" src="" style="opacity: 0;">
        <div id="info-overlay" style="opacity: 0;">
            <div id="title">Loading...</div>
            <div id="meta">Genre Filter Active</div>
        </div>
    </div>

    <script>
        /* MAL Genre IDs: 22=Romance, 36=Slice of Life, 60=Idols (Female), 19=Music, 9=Ecchi */
        const PREFERRED_GENRES = [22, 36, 60, 19, 9]; 
        const START_DATE = '2013-01-01';
        const END_DATE = '2026-12-31';
        const REFRESH_RATE = 30000; 

        async function fetchDiscoveryAnime() {
            const posterImg = document.getElementById('poster');
            const bgBlur = document.getElementById('bg-blur');
            const infoOverlay = document.getElementById('info-overlay');
            
            try {
                const randomGenreId = PREFERRED_GENRES[Math.floor(Math.random() * PREFERRED_GENRES.length)];
                const baseUrl = `https://api.jikan.moe/v4/anime?genres=${randomGenreId}&start_date=${START_DATE}&end_date=${END_DATE}&order_by=popularity`;

                const initialRes = await fetch(`${baseUrl}&limit=1`);
                const initialData = await initialRes.json();
                
                const lastPage = Math.min(initialData.pagination.last_visible_page, 20);
                const randomPage = Math.floor(Math.random() * lastPage) + 1;

                const response = await fetch(`${baseUrl}&page=${randomPage}`);
                const result = await response.json();
                
                const anime = result.data[Math.floor(Math.random() * result.data.length)];
                const imageUrl = anime.images.jpg.large_image_url;

                posterImg.style.opacity = 0;
                infoOverlay.style.opacity = 0;
                
                setTimeout(() => {
                    bgBlur.style.backgroundImage = `url('${imageUrl}')`;
                    posterImg.src = imageUrl;
                    document.getElementById('title').innerText = anime.title_english || anime.title;
                    
                    const genres = anime.genres.slice(0, 3).map(g => g.name).join(', ');
                    document.getElementById('meta').innerText = `${genres} | ${anime.aired?.string || '2013+'}`;

                    posterImg.onload = () => {
                        posterImg.style.opacity = 1;
                        infoOverlay.style.opacity = 1;
                    };
                }, 1500);

            } catch (error) {
                console.error("Fetch Error:", error);
                setTimeout(fetchDiscoveryAnime, 5000);
            }
        }

        fetchDiscoveryAnime();
        setInterval(fetchDiscoveryAnime, REFRESH_RATE);
    </script>
</body>
</html>
