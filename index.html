<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Anime Kiosk</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; }
        #container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #bg-blur { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; background-size: cover; background-position: center; filter: blur(45px) brightness(0.35); transition: background-image 1.5s ease-in-out; z-index: 1; }
        #poster { position: relative; max-width: 85%; max-height: 85%; object-fit: contain; box-shadow: 0 10px 60px rgba(0,0,0,0.9); transition: opacity 1.5s ease-in-out; z-index: 2; border-radius: 4px; }
        #info-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.95) 70%); color: white; padding: 80px 40px 40px 40px; transition: opacity 1.5s ease-in-out; z-index: 3; }
        #title { font-size: 2.4rem; font-weight: 800; margin-bottom: 5px; text-shadow: 2px 2px 10px rgba(0,0,0,0.7); }
        #meta { font-size: 1.2rem; color: #ccc; font-weight: 300; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="container">
        <div id="bg-blur"></div>
        <img id="poster" src="" style="opacity: 0;">
        <div id="info-overlay" style="opacity: 0;">
            <div id="title">Scanning Database...</div>
            <div id="meta">Modern Era Filter Active</div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const PREFERRED_GENRES = [22, 36, 2, 60, 19, 8, 9]; 
        const START_DATE = '2013-01-01';
        const END_DATE = '2026-12-31';
        const REFRESH_RATE = 30000; 

        async function fetchDiscoveryAnime() {
            const posterImg = document.getElementById('poster');
            const bgBlur = document.getElementById('bg-blur');
            const infoOverlay = document.getElementById('info-overlay');
            const titleEl = document.getElementById('title');
            const metaEl = document.getElementById('meta');
            
            try {
                const randomGenreId = PREFERRED_GENRES[Math.floor(Math.random() * PREFERRED_GENRES.length)];
                
                // Construct the URL with Date Range filters
                const baseUrl = `https://api.jikan.moe/v4/anime?genres=${randomGenreId}&start_date=${START_DATE}&end_date=${END_DATE}&order_by=popularity`;

                // 1. Get total pages for this specific date range and genre
                const initialRes = await fetch(`${baseUrl}&limit=1`);
                const initialData = await initialRes.json();
                
                // Cap at 15 pages to ensure we get higher-quality/more relevant results 
                // within the modern era (usually the first few hundred shows)
                const lastPage = Math.min(initialData.pagination.last_visible_page, 15);
                const randomPage = Math.floor(Math.random() * lastPage) + 1;

                // 2. Fetch the random page
                const response = await fetch(`${baseUrl}&page=${randomPage}`);
                const result = await response.json();
                
                const anime = result.data[Math.floor(Math.random() * result.data.length)];
                const imageUrl = anime.images.jpg.large_image_url;

                // Transition
                posterImg.style.opacity = 0;
                infoOverlay.style.opacity = 0;
                
                setTimeout(() => {
                    bgBlur.style.backgroundImage = `url('${imageUrl}')`;
                    posterImg.src = imageUrl;
                    titleEl.innerText = anime.title_english || anime.title;
                    
                    const genres = anime.genres.slice(0, 3).map(g => g.name).join(', ');
                    metaEl.innerText = `${genres} | ${anime.aired?.string || 'Released 2015+'}`;

                    posterImg.onload = () => {
                        posterImg.style.opacity = 1;
                        infoOverlay.style.opacity = 1;
                    };
                }, 1500);

            } catch (error) {
                console.error("API Error:", error);
                setTimeout(fetchDiscoveryAnime, 5000);
            }
        }

        fetchDiscoveryAnime();
        setInterval(fetchDiscoveryAnime, REFRESH_RATE);
    </script>
</body>
</html>
