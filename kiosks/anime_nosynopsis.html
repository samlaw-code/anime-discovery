<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Discovery Kiosk</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        #container { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
        }

        #bg-blur { 
            position: absolute; 
            top: -5%; left: -5%; width: 110%; height: 110%; 
            background-size: cover; 
            background-position: center; 
            filter: blur(60px) brightness(0.25); 
            transition: background-image 1.5s ease-in-out; 
            z-index: 1; 
        }

        #poster { 
            position: relative; 
            height: 95vh; /* Poster occupies almost the entire vertical space */
            width: auto;
            object-fit: contain; 
            margin-top: 0; 
            transition: opacity 1.5s ease-in-out; 
            z-index: 2;
        }

        #info-overlay { 
            position: absolute; 
            bottom: 0; left: 0; right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.8) 30%, rgba(0,0,0,1) 100%); 
            color: white; 
            padding: 50px 20px 10px 20px; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center; 
            transition: opacity 1.5s ease-in-out; 
            z-index: 3; 
            pointer-events: none;
        }

        #title { 
            font-size: 1.7rem; 
            font-weight: 700; 
            margin-bottom: 4px; 
            text-align: center;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #meta { 
            font-size: 1rem; 
            color: #ccc; 
            text-align: center;
            text-shadow: 1px 1px 4px rgba(0,0,0,1);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stars { color: #ffc107; letter-spacing: 2px; font-size: 1.1rem; }
        .score-num { font-weight: bold; color: white; margin-left: -5px; }
    </style>
</head>
<body>

    <div id="container" onclick="fetchDiscoveryAnime()">
        <div id="bg-blur"></div>
        <img id="poster" src="" style="opacity: 0;">
        <div id="info-overlay" style="opacity: 0;">
            <div id="title">Searching...</div>
            <div id="meta">Genre Filter Active</div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // MAL Genre IDs: 22=Romance, 36=Slice of Life, 60=Idols (Female), 19=Music, 9=Ecchi
        const PREFERRED_GENRES = [22, 36, 60, 19, 9]; 
        const START_DATE = '2013-01-01';
        const END_DATE = '2026-12-31';
        const REFRESH_RATE = 30000; // Interval in ms at which to cycle

        function getStarRating(score) {
            if (!score) return "Unrated";
            // Map 0-10 to 0-5 stars
            const starCount = Math.round(score / 2);
            return "★".repeat(starCount) + "☆".repeat(5 - starCount);
        }

        async function fetchDiscoveryAnime() {
            const posterImg = document.getElementById('poster');
            const bgBlur = document.getElementById('bg-blur');
            const infoOverlay = document.getElementById('info-overlay');
            
            try {
                const randomGenreId = PREFERRED_GENRES[Math.floor(Math.random() * PREFERRED_GENRES.length)];
                
                // Construct the URL with Date Range filters
                const baseUrl = `https://api.jikan.moe/v4/anime?genres=${randomGenreId}&start_date=${START_DATE}&end_date=${END_DATE}&order_by=popularity`;

                // 1. Get total pages for this specific date range and genre
                const initialRes = await fetch(`${baseUrl}&limit=1`);
                const initialData = await initialRes.json();
                
                // Cap at 20 pages to ensure we get higher-quality/more relevant results 
                // within the modern era (usually the first few hundred shows)
                const lastPage = Math.min(initialData.pagination.last_visible_page, 20);
                const randomPage = Math.floor(Math.random() * lastPage) + 1;

                // 2. Fetch the random page
                const response = await fetch(`${baseUrl}&page=${randomPage}`);
                const result = await response.json();
                
                const anime = result.data[Math.floor(Math.random() * result.data.length)];
                const imageUrl = anime.images.jpg.large_image_url;

                // Transition
                posterImg.style.opacity = 0;
                infoOverlay.style.opacity = 0;
                
                setTimeout(() => {
                    bgBlur.style.backgroundImage = `url('${imageUrl}')`;
                    posterImg.src = imageUrl;
                    document.getElementById('title').innerText = anime.title_english || anime.title;
                    
                    const stars = getStarRating(anime.score);
                    const scoreText = anime.score ? `(${anime.score.toFixed(1)})` : '';
                    const genres = anime.genres.slice(0, 3).map(g => g.name).join(', ');
                    const aired = anime.aired?.string || '2013+';
                    
                    document.getElementById('meta').innerHTML = `
                        <span class="stars">${stars}</span> 
                        <span class="score-num">${scoreText}</span> | 
                        ${genres} | ${aired}`;

                    posterImg.onload = () => {
                        posterImg.style.opacity = 1;
                        infoOverlay.style.opacity = 1;
                    };
                }, 1500);

            } catch (error) {
                console.error("Fetch Error:", error);
                // If we hit a rate limit, try again in 5 seconds
                setTimeout(fetchDiscoveryAnime, 5000);
            }
        }

        fetchDiscoveryAnime();
        setInterval(fetchDiscoveryAnime, REFRESH_RATE);
    </script>
</body>
</html>
