<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Anime Discovery Kiosk</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
        }
        
        #container { 
            position: relative; width: 100%; height: 100dvh; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; overflow: hidden;
            cursor: default; /* No longer a giant button */
        }

        #bg-blur { 
            position: absolute; top: -5%; left: -5%; width: 110%; height: 110%; 
            background-size: cover; background-position: center; 
            filter: blur(60px) brightness(0.25); 
            transition: background-image 1.5s ease-in-out; 
            z-index: 1; 
        }

        #progress-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 4px; 
            background: rgba(255, 255, 255, 0.1); z-index: 20; 
        }
        #progress-bar { 
            height: 100%; width: 0%; background: #ffc107; 
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.5); 
            transition: width 0.1s linear; 
        }

        #poster { 
            position: relative; flex: 1; min-height: 0; 
            width: auto; max-width: 95%; object-fit: contain; 
            margin: 15px 0 0 0; transition: opacity 1.5s ease-in-out; 
            z-index: 2; 
        }

        /* Navigation Button Row */
        .nav-btn {
            position: absolute; top: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1); color: rgba(255,255,255,0.6);
            padding: 10px; border-radius: 50%; cursor: pointer; text-decoration: none;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        .nav-btn:hover { background: rgba(0,0,0,0.8); color: #fff; border-color: #ffc107; }
        
        #home-btn { left: 20px; }
        #back-btn { left: 75px; display: none; } 
        #next-btn { left: 130px; } /* Positioned for easy access */

        #freeze-btn {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); color: white; 
            padding: 10px 15px; border-radius: 30px; cursor: pointer; 
            font-size: 0.75rem; text-transform: uppercase; transition: all 0.3s ease;
            display: flex; align-items: center; gap: 8px;
        }
        #freeze-btn.active { border-color: #ffc107; color: #ffc107; }

        #info-overlay { 
            position: relative; width: 100%; background: transparent; 
            color: white; padding: 20px 40px 40px 40px; 
            display: flex; flex-direction: column; align-items: center; 
            transition: opacity 1.5s ease-in-out; z-index: 3; 
            flex-shrink: 0; box-sizing: border-box;
        }

        #title { font-size: 1.6rem; font-weight: 800; margin-bottom: 2px; text-align: center; text-shadow: 2px 2px 10px #000; max-width: 95%; }
        #meta { font-size: 0.8rem; color: #bbb; text-align: center; margin-bottom: 12px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; text-transform: uppercase; }
        
        #synopsis { 
            font-size: 0.85rem; line-height: 1.4; max-width: 800px; 
            color: #eee; text-align: left; display: -webkit-box; 
            -webkit-line-clamp: 10; -webkit-box-orient: vertical; 
            overflow: hidden; text-shadow: 1px 1px 4px #000; 
            pointer-events: auto; /* Allows you to highlight text */
        }

        .stars { color: #ffc107; letter-spacing: 2px; }
        .score-num { color: #fff; font-weight: bold; margin-left: -5px; }
        .year-tag { color: #fff; font-weight: bold; }
        .ep-tag { color: #ffc107; font-weight: bold; }
    </style>
</head>
<body>
    <div id="container">
        <div id="progress-container"><div id="progress-bar"></div></div>
        
        <a href="../index.html" id="home-btn" class="nav-btn" title="Home">🏠</a>
        <div id="back-btn" class="nav-btn" onclick="goBack(event)" title="Previous">⬅️</div>
        <div id="next-btn" class="nav-btn" onclick="handleNextClick(event)" title="Next">➡️</div>

        <div id="freeze-btn" onclick="toggleFreeze(event)">
            <span id="btn-icon">○</span> <span id="btn-text">Live Mode</span>
        </div>

        <div id="bg-blur"></div>
        <img id="poster" src="" style="opacity: 0;">
        
        <div id="info-overlay" style="opacity: 0;">
            <div id="title">Scanning...</div>
            <div id="meta">...</div>
            <div id="synopsis">...</div>
        </div>
    </div>

    <script>
        const PREFERRED_GENRES = [22, 36, 60, 19, 9]; 
        const START_DATE = '2013-01-01';
        const END_DATE = '2026-12-31';
        const REFRESH_RATE = 60000; 

        let isFrozen = false, timeLeft = REFRESH_RATE, timerUpdate;
        let currentAnimeData = null, previousAnimeData = null;

        function toggleFreeze(e) {
            if(e) e.stopPropagation();
            isFrozen = !isFrozen;
            const btn = document.getElementById('freeze-btn');
            document.getElementById('btn-icon').innerText = isFrozen ? '●' : '○';
            document.getElementById('btn-text').innerText = isFrozen ? 'Frozen' : 'Live Mode';
            isFrozen ? (btn.classList.add('active'), stopTimer()) : (btn.classList.remove('active'), startTimer());
        }

        function handleNextClick(e) {
            if(e) e.stopPropagation();
            timeLeft = REFRESH_RATE; // Reset timer on manual skip
            fetchDiscoveryAnime();
        }

        function goBack(e) {
            if(e) e.stopPropagation();
            if (!previousAnimeData) return;
            if (!isFrozen) toggleFreeze();
            [currentAnimeData, previousAnimeData] = [previousAnimeData, currentAnimeData];
            displayAnime(currentAnimeData);
        }

        function startTimer() {
            stopTimer();
            timerUpdate = setInterval(() => {
                if (!isFrozen) {
                    timeLeft -= 100;
                    document.getElementById('progress-bar').style.width = ((REFRESH_RATE - timeLeft) / REFRESH_RATE) * 100 + '%';
                    if (timeLeft <= 0) { timeLeft = REFRESH_RATE; fetchDiscoveryAnime(); }
                }
            }, 100);
        }
        function stopTimer() { clearInterval(timerUpdate); }

        function getStarRating(score) {
            if (!score) return "Unrated";
            const starCount = Math.round(score / 2);
            return "★".repeat(starCount) + "☆".repeat(5 - starCount);
        }

        async function fetchDiscoveryAnime() {
            try {
                const genre = PREFERRED_GENRES[Math.floor(Math.random() * PREFERRED_GENRES.length)];
                const baseUrl = `https://api.jikan.moe/v4/anime?genres=${genre}&start_date=${START_DATE}&end_date=${END_DATE}&order_by=score`;
                const init = await (await fetch(`${baseUrl}&limit=1`)).json();
                const page = Math.floor(Math.random() * Math.min(init.pagination.last_visible_page || 1, 20)) + 1;
                const res = await (await fetch(`${baseUrl}&page=${page}`)).json();
                
                if (!res.data?.length) return fetchDiscoveryAnime();
                const newAnime = res.data[Math.floor(Math.random() * res.data.length)];

                if (currentAnimeData) {
                    previousAnimeData = currentAnimeData;
                    document.getElementById('back-btn').style.display = 'flex';
                }
                currentAnimeData = newAnime;
                displayAnime(currentAnimeData);
            } catch (e) { setTimeout(fetchDiscoveryAnime, 5000); }
        }

        function displayAnime(a) {
            const p = document.getElementById('poster'), b = document.getElementById('bg-blur'), o = document.getElementById('info-overlay');
            p.style.opacity = o.style.opacity = 0;
            setTimeout(() => {
                const img = a.images.jpg.large_image_url;
                b.style.backgroundImage = `url('${img}')`;
                p.src = img;
                document.getElementById('title').innerText = a.title_english || a.title;
                const stars = getStarRating(a.score);
                document.getElementById('meta').innerHTML = `<span class="stars">${stars}</span> (${a.score?.toFixed(1) || '?'}) | <span class="year-tag">${a.aired?.prop?.from?.year || '????'}</span> | <span class="ep-tag">${a.episodes || '?'} EPS</span> | ${a.genres.slice(0,2).map(g=>g.name).join(', ')} | ${a.type || 'TV'}`;
                document.getElementById('synopsis').innerText = a.synopsis || "No synopsis available.";
                p.onload = () => { p.style.opacity = o.style.opacity = 1; };
            }, 1500);
        }

        fetchDiscoveryAnime(); startTimer();
    </script>
</body>
</html>
