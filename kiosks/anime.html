<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Anime Discovery Kiosk</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
        }
        
        #container { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
        }

        #bg-blur { 
            position: absolute; 
            top: -5%; 
            left: -5%; 
            width: 110%; 
            height: 110%; 
            background-size: cover; 
            background-position: center; 
            filter: blur(60px) brightness(0.2); 
            transition: background-image 1.5s ease-in-out; 
            z-index: 1; 
        }

        /* Progress Bar */
        #progress-container { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 4px; 
            background: rgba(255, 255, 255, 0.1); 
            z-index: 20; 
        }
        #progress-bar { 
            height: 100%; 
            width: 0%; 
            background: #ffc107; 
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.5); 
            transition: width 0.1s linear; 
        }

        #poster { 
            position: relative; 
            height: 85vh; /* Poster occupies almost the entire vertical space */
            width: auto; 
            object-fit: contain; 
            margin-top: 0; 
            transition: opacity 1.5s ease-in-out; 
            z-index: 2; 
        }

        #home-btn {
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: rgba(255,255,255,0.6);
            padding: 10px; 
            border-radius: 50%; 
            cursor: pointer; 
            text-decoration: none;
            width: 40px; 
            height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: all 0.3s ease;
        }
        #home-btn:hover { 
            background: rgba(0,0,0,0.8); 
            color: #fff; 
            border-color: #ffc107; 
        }

        #freeze-btn {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            z-index: 10;
            background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            color: white; 
            padding: 10px 15px; 
            border-radius: 30px;
            cursor: pointer; 
            font-size: 0.75rem; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            transition: all 0.3s ease;
            display: flex; 
            align-items: center; 
            gap: 8px;
        }
        #freeze-btn.active { 
            border-color: #ffc107; 
            color: #ffc107; 
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.2); 
        }

        #info-overlay { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.98) 25%, rgba(0,0,0,1) 100%); 
            color: white; 
            padding: 80px 40px 30px 40px; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            align-items: center; 
            transition: opacity 1.5s ease-in-out; 
            z-index: 3; 
            pointer-events: none;
        }

        #title { 
            font-size: 1.7rem; 
            font-weight: 800; 
            margin-bottom: 2px; 
            text-align: center; 
            text-shadow: 2px 2px 8px #000; 
            max-width: 90%; 
        }
        #meta { 
            font-size: 0.85rem; 
            color: #bbb; 
            text-align: center; 
            margin-bottom: 15px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center; 
            gap: 8px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        #synopsis { 
            font-size: 0.85rem; 
            line-height: 1.4; 
            max-width: 750px; 
            color: #ddd; 
            text-align: left; 
            display: -webkit-box; 
            -webkit-line-clamp: 10; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            text-shadow: 1px 1px 2px #000; 
        }

        .stars { color: #ffc107; letter-spacing: 2px; }
        .score-num { color: #fff; font-weight: bold; margin-left: -5px; }
        .year-tag { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="container" onclick="handleContainerClick(event)">
        <div id="progress-container"><div id="progress-bar"></div></div>
        <a href="../index.html" id="home-btn" onclick="event.stopPropagation();">🏠</a>
        <div id="freeze-btn" onclick="toggleFreeze(event)">
            <span id="btn-icon">○</span> <span id="btn-text">Live Mode</span>
        </div>
        <div id="bg-blur"></div>
        <img id="poster" src="" style="opacity: 0;">
        <div id="info-overlay" style="opacity: 0;">
            <div id="title">Scanning Library...</div>
            <div id="meta">...</div>
            <div id="synopsis">...</div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // MAL Genre IDs: 22=Romance, 36=Slice of Life, 60=Idols (Female), 19=Music, 9=Ecchi
        const PREFERRED_GENRES = [22, 36, 60, 19, 9]; 
        const START_DATE = '2013-01-01';
        const END_DATE = '2026-12-31';
        const REFRESH_RATE = 60000; // Refresh every 60s

        let isFrozen = false;
        let timeLeft = REFRESH_RATE;
        let timerUpdate;

        function toggleFreeze(event) {
            event.stopPropagation();
            isFrozen = !isFrozen;
            const btn = document.getElementById('freeze-btn');
            const icon = document.getElementById('btn-icon');
            const text = document.getElementById('btn-text');

            if (isFrozen) {
                btn.classList.add('active');
                icon.innerText = '●';
                text.innerText = 'Frozen';
                stopTimer();
            } else {
                btn.classList.remove('active');
                icon.innerText = '○';
                text.innerText = 'Live Mode';
                startTimer();
            }
        }

        function handleContainerClick(event) {
            if (!isFrozen) {
                timeLeft = REFRESH_RATE;
                fetchDiscoveryAnime();
            }
        }

        function startTimer() {
            stopTimer();
            timerUpdate = setInterval(() => {
                if (!isFrozen) {
                    timeLeft -= 100;
                    const progress = ((REFRESH_RATE - timeLeft) / REFRESH_RATE) * 100;
                    document.getElementById('progress-bar').style.width = progress + '%';
                    if (timeLeft <= 0) {
                        timeLeft = REFRESH_RATE;
                        fetchDiscoveryAnime();
                    }
                }
            }, 100);
        }

        function stopTimer() { clearInterval(timerUpdate); }

        function getStarRating(score) {
            if (!score) return "Unrated";
            const starCount = Math.round(score / 2);
            return "★".repeat(starCount) + "☆".repeat(5 - starCount);
        }

        async function fetchDiscoveryAnime() {
            const posterImg = document.getElementById('poster');
            const bgBlur = document.getElementById('bg-blur');
            const infoOverlay = document.getElementById('info-overlay');
            
            try {
                const randomGenreId = PREFERRED_GENRES[Math.floor(Math.random() * PREFERRED_GENRES.length)];
                
                // Construct the URL with Date Range filters
                const baseUrl = `https://api.jikan.moe/v4/anime?genres=${randomGenreId}&start_date=${START_DATE}&end_date=${END_DATE}&order_by=score`;

                // 1. Get total pages for this specific date range and genre
                const initialRes = await fetch(`${baseUrl}&limit=1`);
                const initialData = await initialRes.json();
                
                // Cap at 20 pages to ensure we get higher-quality/more relevant results 
                // within the modern era (usually the first few hundred shows)
                const apiTotalPages = initialData.pagination.last_visible_page || 1;
                const lastPage = Math.min(apiTotalPages, 20);
                const randomPage = Math.floor(Math.random() * lastPage) + 1;

                // 2. Fetch the random page
                const response = await fetch(`${baseUrl}&page=${randomPage}`);
                const result = await response.json();
                
                // === NEW ANTI-BLACK SCREEN GUARD ===
                // If the data is empty, trigger a retry immediately instead of waiting 60s
                if (!result.data || result.data.length === 0) {
                    console.warn("No results found on this page, retrying...");
                    return fetchDiscoveryAnime(); 
                }

                const anime = result.data[Math.floor(Math.random() * result.data.length)];

                // Transition when we have successful data
                posterImg.style.opacity = 0;
                infoOverlay.style.opacity = 0;
                
                setTimeout(() => {
                    const imageUrl = anime.images.jpg.large_image_url;
                    bgBlur.style.backgroundImage = `url('${imageUrl}')`;
                    posterImg.src = imageUrl;
                    
                    document.getElementById('title').innerText = anime.title_english || anime.title;
                    const stars = getStarRating(anime.score);
                    const scoreNum = anime.score ? `(${anime.score.toFixed(1)})` : '';
                    const year = anime.aired?.prop?.from?.year || '????';
                    const genres = anime.genres.slice(0, 2).map(g => g.name).join(', ');
                    const type = anime.type || 'TV';

                    document.getElementById('meta').innerHTML = `
                        <span class="stars">${stars}</span> <span class="score-num">${scoreNum}</span> | 
                        <span class="year-tag">${year}</span> | 
                        ${genres} | ${type}`;
                    
                    document.getElementById('synopsis').innerText = anime.synopsis || "No synopsis available.";

                    posterImg.onload = () => {
                        posterImg.style.opacity = 1;
                        infoOverlay.style.opacity = 1;
                    };
                }, 1500);

            } catch (error) {
                console.error("Fetch Error:", error);
                // If the API fails entirely (rate limit), try again in 5s
                setTimeout(fetchDiscoveryAnime, 5000);
            }
        }

        fetchDiscoveryAnime();
        startTimer();
    </script>
</body>
</html>
